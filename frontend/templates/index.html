<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEIG - Evidence Upload</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include 'navbar.html' %}

    <div class="page-sm">
        <div class="page-header animate">
            <div class="page-title">Investigator Portal</div>
            <div class="page-subtitle">Upload & Store Evidence on Blockchain</div>
        </div>

        <div class="card animate animate-delay-1">
            <form id="upload-form" action="/upload" method="POST" enctype="multipart/form-data">
                
                <div class="form-group">
                    <label class="form-label">Case ID</label>
                    <input type="text" name="case_id" class="form-input"
                           placeholder="e.g. CASE001" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Investigator Name</label>
                    <input type="text" name="investigator_name" class="form-input"
                           placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Evidence File</label>
                    <div class="upload-zone">
                        <div class="upload-icon">📁</div>
                        <div class="upload-text">Select evidence file to upload</div>
                        <input type="file" name="file" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    🔐 Generate Hash & Store on Blockchain
                </button>
            </form>
        </div>
    </div>
    <!-- Loading Overlay -->
<div id="loading-overlay" style="display:none; position:fixed; top:0; left:0; 
     width:100%; height:100%; background:rgba(6,10,18,0.95); z-index:999;
     flex-direction:column; align-items:center; justify-content:center;">
    <div style="font-family:'Orbitron',sans-serif; font-size:18px; 
                color:var(--gold); letter-spacing:3px; margin-bottom:20px;">
        PROCESSING...
    </div>
    <div style="width:60px; height:60px; border:3px solid var(--gold-dim);
                border-top:3px solid var(--gold); border-radius:50%;
                animation:spin 1s linear infinite; margin-bottom:30px;">
    </div>
    <div id="loading-tip" style="font-size:13px; color:var(--muted); 
         max-width:500px; text-align:center; padding:0 20px;
         transition:opacity 0.3s; letter-spacing:0.5px;">
    </div>
</div>
</body>
</html>
