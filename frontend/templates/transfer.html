<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEIG - Transfer Custody</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include 'navbar.html' %}

    <div class="page-sm">
        <div class="page-header animate">
            <div class="page-title">Transfer Custody</div>
            <div class="page-subtitle">Record Chain of Custody on Blockchain</div>
        </div>

        <div class="card animate animate-delay-1">
            <form id="transfer-form" action="/transfer" method="POST">

                <div class="form-group">
                    <label class="form-label">Case ID</label>
                    <input type="text" name="case_id" class="form-input"
                           placeholder="e.g. CASE001" required>
                </div>

                <div class="form-group">
                    <label class="form-label">From Custodian</label>
                    <input type="text" name="from_custodian" class="form-input"
                           placeholder="Current custodian name" required>
                </div>

                <div class="form-group">
                    <label class="form-label">To Custodian</label>
                    <input type="text" name="to_custodian" class="form-input"
                           placeholder="New custodian name" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Remarks</label>
                    <input type="text" name="remarks" class="form-input"
                           placeholder="Reason for transfer" required>
                </div>

                <button type="submit" class="btn btn-primary">
                    🔄 Transfer Custody on Blockchain
                </button>
            </form>
        </div>
    </div>
</body>
</html>
