<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEIG - Court Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>⚖️ NEIG</h1>
        <h3>NATIONAL EVIDENCE INTEGRITY GRID</h3>
        <p style="color:#aaaaaa; font-size:13px; margin-bottom:20px;">
            Court Verification Portal — Verify Evidence Authenticity
        </p>
        
        <form action="/verify" method="POST" enctype="multipart/form-data">
            
            <p class="label">Case ID:</p>
            <input type="text" 
                   name="case_id" 
                   placeholder="Enter Case ID (e.g. CASE001)" 
                   required
                   style="width:100%; padding:10px; background:#0a0a0a; 
                          border:1px solid #00d4ff33; border-radius:8px; 
                          color:white; margin-bottom:15px; font-size:14px;">
            
            <div class="upload-area">
                <p style="color:#aaaaaa; margin-bottom:15px;">
                    Upload Evidence File to Verify
                </p>
                <input type="file" name="file" required>
            </div>
            
            <button type="submit">🔍 VERIFY EVIDENCE</button>
        </form>

        <a href="/">← Back to Investigator Portal</a>
    </div>
</body>
</html>
