<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEIG - Court Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include 'navbar.html' %}

    <div class="page-sm">
        <div class="page-header animate">
            <div class="page-title">Court Verification Portal</div>
            <div class="page-subtitle">Verify Evidence Authenticity on Blockchain</div>
        </div>

        <div class="card animate animate-delay-1">
            <form id="verify-form" action="/verify" method="POST" enctype="multipart/form-data">

                <div class="form-group">
                    <label class="form-label">Case ID</label>
                    <input type="text" name="case_id" class="form-input"
                           placeholder="e.g. CASE001" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Evidence File</label>
                    <div class="upload-zone">
                        <div class="upload-icon">🔍</div>
                        <div class="upload-text">Upload evidence file to verify</div>
                        <input type="file" name="file" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    🔍 Verify Evidence Integrity
                </button>
            </form>
        </div>
    </div>
</body>
</html>
