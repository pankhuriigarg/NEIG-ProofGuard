<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEIG - Transfer Complete</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include 'navbar.html' %}

    <div class="page-sm">
        <div class="alert alert-success animate">
            ✅ Custody Transferred Successfully on Blockchain!
        </div>

        <div class="card animate animate-delay-1">
            <div class="data-row">
                <div class="data-label">Case ID</div>
                <div class="data-value white">{{ case_id }}</div>
            </div>

            <div class="data-row">
                <div class="data-label">From Custodian</div>
                <div class="data-value white">{{ from_custodian }}</div>
            </div>

            <div class="data-row" style="margin-bottom:0;">
                <div class="data-label">To Custodian</div>
                <div class="data-value white" 
                     style="color:var(--gold); border-color:var(--border);">
                    {{ to_custodian }}
                </div>
            </div>
        </div>

        <div class="card animate animate-delay-2">
            <div class="data-label">Blockchain Transaction Hash</div>
            <div class="data-value gold" style="margin-top:8px;">
                {{ tx_hash }}
            </div>
        </div>

        <div class="action-links animate animate-delay-3">
            <a href="/dashboard" class="action-link">📊 Dashboard</a>
            <a href="/transfer" class="action-link">🔄 Transfer Another</a>
            <a href="/" class="action-link">🏠 Home</a>
        </div>
    </div>
</body>
</html>
